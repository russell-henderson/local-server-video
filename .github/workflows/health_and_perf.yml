name: Health and Performance Checks

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  health-perf:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start application
        run: |
          nohup python main.py > server.log 2>&1 &
          echo $! > server.pid
          # Poll until the server is ready (up to 30 seconds)
          ready=0
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:5000/ > /dev/null 2>&1; then
              echo "Server is ready after ${i}s"
              ready=1
              break
            fi
            echo "Waiting for server... (${i}s elapsed)"
            sleep 1
          done
          if [ $ready -eq 0 ]; then
            echo "Server failed to start within 30 seconds"
            cat server.log
            exit 1
          fi

      - name: Run database health check
        run: python scripts/db_health_check.py

      - name: Run HTTP smoke load check
        env:
          LVS_SMOKE_BASE_URL: http://127.0.0.1:5000
        run: python scripts/http_smoke_load_check.py --iterations 10

      - name: Upload server logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: server-log
          path: server.log

      - name: Stop application
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill $(cat server.pid) || true
          fi
